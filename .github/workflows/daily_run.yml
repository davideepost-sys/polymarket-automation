name: Daily Polymarket Analyzer

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run scraper
      run: |
        python scraper.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: polymarket-smart-money
        path: smart_money_*.csv
